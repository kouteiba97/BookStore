name: elbayan_admin
description: "مكتبة البيان — back-office admin mobile app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  url_launcher: ^6.3.1
  cached_network_image: ^3.4.1
  shared_preferences: ^2.3.3
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.2

# Launcher icons generated from the brand logo (assets/logo.svg rasterized).
# Regenerate with: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/icon_full.png
  adaptive_icon_background: "#122318"
  adaptive_icon_foreground: assets/icon/icon_fg.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/logo.svg
